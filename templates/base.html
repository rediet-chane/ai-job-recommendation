<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}AI Job Recommendation{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Light Theme (Default) */
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #5a6e7c;
            --border-color: #ecf0f1;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.05);
            --navbar-bg: #ffffff;
            --footer-bg: #ffffff;
            --input-bg: #ffffff;
            --badge-bg: #ecf0f1;
        }
        
        /* Dark Theme */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #eaeef2;
            --text-secondary: #a8b2c3;
            --border-color: #2d3748;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.3);
            --navbar-bg: #0f0f1a;
            --footer-bg: #0f0f1a;
            --input-bg: #1e1e2a;
            --badge-bg: #2d3748;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /* Navbar */
        .navbar {
            background: var(--navbar-bg);
            box-shadow: var(--card-shadow);
            padding: 0.6rem 0;
            transition: background 0.3s ease;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        .navbar-brand i { color: #3498db; margin-right: 6px; }
        .navbar-toggler {
            border: none;
            padding: 6px 10px;
            background: var(--badge-bg);
            border-radius: 8px;
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%280, 0, 0, 0.6%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        [data-theme="dark"] .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.8%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.5rem 0.8rem;
            transition: 0.2s;
        }
        .nav-link:hover { color: #3498db !important; background: var(--badge-bg); border-radius: 8px; }
        .nav-link i { margin-right: 6px; width: 20px; }
        
        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--badge-bg);
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            background: #3498db;
            color: white;
        }
        
        @media (max-width: 768px) {
            .navbar-collapse {
                background: var(--bg-secondary);
                padding: 12px;
                border-radius: 12px;
                margin-top: 10px;
                box-shadow: var(--card-shadow);
            }
            .nav-link { text-align: center; padding: 8px; }
            .theme-toggle { margin: 10px auto; display: block; width: fit-content; }
        }
        
        /* Cards */
        .card {
            border: none;
            border-radius: 12px;
            background: var(--bg-secondary);
            box-shadow: var(--card-shadow);
            margin-bottom: 16px;
            transition: background 0.3s ease, transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .card-body { padding: 0.8rem 1rem; }
        
        /* Buttons */
        .btn {
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 500;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-primary { background: #3498db; border: none; }
        .btn-primary:hover { background: #2980b9; transform: translateY(-1px); }
        .btn-sm { padding: 4px 12px; font-size: 0.7rem; }
        .btn-success { background: #27ae60; border: none; }
        .btn-success:hover { background: #219a52; }
        
        /* Skill Badges */
        .skill-badge {
            background: var(--badge-bg);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            margin: 2px;
            display: inline-block;
            color: var(--text-primary);
        }
        .telegram-badge {
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
        }
        .match-score {
            font-weight: 700;
            font-size: 1rem;
        }
        
        /* Hero */
        .hero-section {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 0;
            text-align: center;
            margin-bottom: 30px;
        }
        .hero-section h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .hero-section p { font-size: 0.9rem; opacity: 0.9; }
        
        /* Loading */
        .loading-spinner {
            width: 35px;
            height: 35px;
            border: 3px solid var(--border-color);
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Form */
        textarea, input {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 12px;
            width: 100%;
            font-size: 0.85rem;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        textarea:focus, input:focus { outline: none; border-color: #3498db; }
        .exp-badge {
            background: var(--badge-bg);
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            margin: 3px;
            display: inline-block;
            font-size: 0.75rem;
            color: var(--text-primary);
        }
        .exp-badge.active { background: #3498db; color: white; }
        
        .footer {
            background: var(--footer-bg);
            padding: 15px 0;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-secondary);
        }
        
        /* Gap items */
        .gap-item { transition: 0.2s; }
        .gap-item:hover { transform: translateX(5px); }
        
        /* Priority Colors */
        .priority-high { background: #ffe6e6; border-left: 3px solid #dc3545; }
        .priority-medium { background: #fff3cd; border-left: 3px solid #ffc107; }
        .priority-low { background: #e6f4e6; border-left: 3px solid #28a745; }
        [data-theme="dark"] .priority-high { background: #2c1a1a; }
        [data-theme="dark"] .priority-medium { background: #2c2a1a; }
        [data-theme="dark"] .priority-low { background: #1a2c1a; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-brain"></i>AI Career Mate
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/quiz"><i class="fas fa-question-circle"></i> Quiz</a></li>
                    <li class="nav-item"><a class="nav-link" href="/manual-input"><i class="fas fa-search"></i> Find Jobs</a></li>
                    <li class="nav-item"><a class="nav-link" href="/upload-cv"><i class="fas fa-file-upload"></i> Upload CV</a></li>
                </ul>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
                </button>
            </div>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <footer class="footer">
        <div class="container">
            <p><i class="fas fa-heart text-danger"></i> AI Career Mate</p>
            <p class="small">© 2024 CPU Computer Science Department</p>
        </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            const themeText = document.getElementById('themeText');
            if (themeText) themeText.textContent = newTheme === 'light' ? 'Dark' : 'Light';
            const themeIcon = document.querySelector('#themeToggle i');
            if (themeIcon) themeIcon.className = newTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            const themeText = document.getElementById('themeText');
            if (themeText) themeText.textContent = savedTheme === 'light' ? 'Dark' : 'Light';
            const themeIcon = document.querySelector('#themeToggle i');
            if (themeIcon) themeIcon.className = savedTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
