{% extends "base.html" %}

{% block title %}Find Jobs{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="row">
        <div class="col-lg-8 offset-lg-2">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-keyboard me-2"></i>Enter Your Skills
                </div>
                <div class="card-body">
                    <textarea class="form-control mb-3" id="skills" rows="3" placeholder="e.g., python, sql, javascript, communication, leadership"></textarea>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Experience Level</label>
                        <div>
                            <span class="exp-badge entry active" data-level="entry">Entry</span>
                            <span class="exp-badge mid" data-level="mid">Mid</span>
                            <span class="exp-badge senior" data-level="senior">Senior</span>
                            <span class="exp-badge lead" data-level="lead">Lead</span>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100" id="findJobs"><i class="fas fa-search me-2"></i>Find Jobs</button>
                </div>
            </div>
            
            <div id="loading" style="display: none;" class="text-center my-4">
                <div class="loading-spinner"></div>
                <p class="small">Analyzing your skills...</p>
            </div>
            
            <div id="results" style="display: none;" class="mt-3"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="gapModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-chart-bar me-2"></i>Skill Gap Analysis</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="gapModalBody"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    $('.exp-badge').click(function() {
        $('.exp-badge').removeClass('active');
        $(this).addClass('active');
    });
    
    $('#findJobs').click(function() {
        let skills = $('#skills').val().trim();
        if (!skills) return alert('Please enter your skills');
        
        $(this).prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Searching...');
        $('#loading').show();
        $('#results').hide();
        
        $.ajax({
            url: '/get-recommendations',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ skills: skills }),
            success: function(res) {
                $('#findJobs').prop('disabled', false).html('<i class="fas fa-search me-2"></i>Find Jobs');
                $('#loading').hide();
                if (res.success && res.recommendations.length) displayResults(res.recommendations);
                else $('#results').html('<div class="alert alert-warning">No jobs found</div>').show();
            },
            error: function() {
                $('#findJobs').prop('disabled', false).html('<i class="fas fa-search me-2"></i>Find Jobs');
                $('#loading').hide();
                $('#results').html('<div class="alert alert-danger">Error</div>').show();
            }
        });
    });
});

function displayResults(jobs) {
    let html = '<h5 class="mb-3">Job Matches</h5>';
    jobs.forEach((job, i) => {
        let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '📌';
        let skills = job.required_skills.split(',').slice(0,5).map(s => `<span class="skill-badge">${s.trim()}</span>`).join('');
        
        // Use apply_link first, fallback to message_link
        const applyUrl = job.apply_link || job.message_link;
        
        html += `
            <div class="card mb-2">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="me-2">${medal}</span>
                            <strong>${job.title}</strong>
                            ${job.channel ? `<span class="telegram-badge ms-2"><i class="fab fa-telegram"></i> ${job.channel}</span>` : ''}
                        </div>
                        <span class="badge ${job.match_score > 70 ? 'bg-success' : job.match_score > 40 ? 'bg-warning' : 'bg-secondary'}">${job.match_score}%</span>
                    </div>
                    <div class="mt-2">${skills}</div>
                    <div class="mt-2 d-flex gap-2">
                        ${applyUrl ? 
                            `<a href="${applyUrl}" target="_blank" class="btn btn-sm btn-success"><i class="fab fa-telegram"></i> Apply Now</a>` : 
                            '<span class="text-muted small">No apply link</span>'}
                        <button class="btn btn-sm btn-outline-primary" onclick="viewSkillGap(${job.job_id})">Skill Gap</button>
                    </div>
                </div>
            </div>
        `;
    });
    $('#results').html(html).show();
}

function viewSkillGap(jobId) {
    $('#gapModal').modal('show');
    $('#gapModalBody').html('<div class="text-center"><div class="loading-spinner"></div><p>Analyzing your skills...</p></div>');
    
    $.get(`/skill-gap/${jobId}`, function(data) {
        if (data.gaps && data.gaps.length) {
            let html = `<h6 class="mb-2">Missing Skills for: ${data.job_title}</h6>`;
            data.gaps.forEach(gap => {
                let priorityColor = gap.priority === 'High' ? '#dc3545' : gap.priority === 'Medium' ? '#ffc107' : '#28a745';
                html += `
                    <div style="background: ${gap.priority === 'High' ? '#ffe6e6' : gap.priority === 'Medium' ? '#fff3cd' : '#e6f4e6'}; border-left: 3px solid ${priorityColor}; padding: 10px; margin-bottom: 8px; border-radius: 8px;">
                        <strong>${gap.skill}</strong>
                        <span class="badge ${gap.priority === 'High' ? 'bg-danger' : gap.priority === 'Medium' ? 'bg-warning' : 'bg-success'}">${gap.priority}</span>
                        <br><a href="${gap.learning_url}" target="_blank" class="small">Learn this skill →</a>
                    </div>
                `;
            });
            $('#gapModalBody').html(html);
        } else {
            $('#gapModalBody').html('<div class="alert alert-success">🎉 You have all the required skills for this job!</div>');
        }
    }).fail(() => {
        $('#gapModalBody').html('<div class="alert alert-danger">Error loading gap analysis</div>');
    });
}
</script>
{% endblock %}
