{% extends "base.html" %}

{% block title %}Upload CV - AI Career Mate{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-8 offset-lg-2">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-file-upload"></i> Upload Your CV / Resume
                </div>
                <div class="card-body">
                    <p class="text-muted small">Supported formats: PDF, DOCX, TXT (max 16MB)</p>
                    <form id="cvForm" enctype="multipart/form-data">
                        <input type="file" class="form-control mb-3" id="cvFile" accept=".pdf,.docx,.txt">
                        <button type="submit" class="btn btn-primary w-100 py-3" id="uploadBtn">
                            <i class="fas fa-robot me-2"></i>Analyze with AI
                        </button>
                    </form>
                    <div id="loading" style="display: none;" class="text-center my-4">
                        <div class="loading-spinner"></div>
                        <p>AI is analyzing your resume...</p>
                    </div>
                    <div id="results" style="display: none;" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="gapModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Skill Gap Analysis</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="gapModalBody"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('cvForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    let file = document.getElementById('cvFile').files[0];
    if (!file) return alert('Please select a file');
    
    let fd = new FormData();
    fd.append('cv', file);
    
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('uploadBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    
    try {
        let res = await fetch('/analyze-cv', { method: 'POST', body: fd });
        let data = await res.json();
        if (data.error) alert(data.error);
        else displayResults(data);
    } catch(e) { alert('Error analyzing file'); }
    finally {
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadBtn').innerHTML = '<i class="fas fa-robot me-2"></i>Analyze with AI';
        document.getElementById('loading').style.display = 'none';
    }
});

function displayResults(data) {
    let html = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> Skills detected: <strong>${data.skills.join(', ')}</strong></div>`;
    
    if (data.resume_tips?.length) {
        html += `<h6 class="mt-3"><i class="fas fa-lightbulb"></i> Personalized Resume Tips</h6>`;
        data.resume_tips.forEach(tip => {
            html += `<div class="card mb-2"><div class="card-body p-2"><strong>${tip.category}</strong><ul class="mb-0 mt-1">${tip.tips.map(t => `<li><small>${t}</small></li>`).join('')}</ul></div></div>`;
        });
    }
    
    if (data.recommendations?.length) {
        html += `<h6 class="mt-3"><i class="fas fa-briefcase"></i> Recommended Jobs</h6>`;
        data.recommendations.forEach(job => {
            html += `<div class="card mb-2"><div class="card-body p-3">
                <div class="d-flex justify-content-between"><strong>${job.title}</strong><span class="match-score">${job.match_score}%</span></div>
                ${job.apply_link ? `<a href="${job.apply_link}" target="_blank" class="btn btn-sm btn-success mt-2">Apply Now</a>` : ''}
                <button class="btn btn-sm btn-outline-primary ms-2 mt-2" onclick="viewGap(${job.job_id})">Skill Gap</button>
            </div></div>`;
        });
    }
    
    document.getElementById('results').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function viewGap(jobId) {
    $('#gapModal').modal('show');
    $('#gapModalBody').html('<div class="text-center"><div class="loading-spinner"></div><p>Analyzing...</p></div>');
    $.get(`/skill-gap/${jobId}`, data => {
        if (data.gaps?.length) {
            let html = `<h6>Missing Skills for: ${data.job_title}</h6>`;
            data.gaps.forEach(g => {
                html += `<div class="gap-item priority-${g.priority.toLowerCase()}"><strong>${g.skill}</strong> - ${g.priority}<br><a href="${g.learning_url}" target="_blank">Learn →</a></div>`;
            });
            $('#gapModalBody').html(html);
        } else $('#gapModalBody').html('<div class="alert alert-success">You have all required skills! 🎉</div>');
    });
}
</script>
{% endblock %}
