{% extends "base.html" %}

{% block title %}Upload CV{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="row">
        <div class="col-lg-8 offset-lg-2">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-file-upload me-2"></i>Upload Your CV
                </div>
                <div class="card-body">
                    <p class="small text-muted">Supported: PDF, DOCX, TXT (max 16MB)</p>
                    <form id="cvForm" enctype="multipart/form-data">
                        <input type="file" class="form-control mb-3" id="cvFile" accept=".pdf,.docx,.txt">
                        <button type="submit" class="btn btn-primary w-100" id="uploadBtn"><i class="fas fa-robot me-2"></i>Analyze with AI</button>
                    </form>
                    <div id="loading" style="display: none;" class="text-center my-3">
                        <div class="loading-spinner"></div>
                        <p class="small">Analyzing your resume...</p>
                    </div>
                    <div id="results" style="display: none;" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="gapModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Skill Gap Analysis</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="gapModalBody"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('cvForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    let file = document.getElementById('cvFile').files[0];
    if (!file) return alert('Select a file');
    
    let formData = new FormData();
    formData.append('cv', file);
    
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('uploadBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    
    try {
        let res = await fetch('/analyze-cv', { method: 'POST', body: formData });
        let data = await res.json();
        if (data.error) alert(data.error);
        else displayResults(data);
    } catch(e) { 
        alert('Error analyzing file'); 
        console.error(e);
    } finally {
        document.getElementById('uploadBtn').disabled = false;
        document.getElementById('uploadBtn').innerHTML = '<i class="fas fa-robot me-2"></i>Analyze with AI';
        document.getElementById('loading').style.display = 'none';
    }
});

function displayResults(data) {
    let html = `
        <div class="alert alert-success py-2">
            <i class="fas fa-check-circle"></i> Skills detected: <strong>${data.skills.join(', ') || 'None found'}</strong>
        </div>
    `;
    
    // Resume Tips
    if (data.resume_tips && data.resume_tips.length) {
        html += `<h6 class="mt-3 mb-2"><i class="fas fa-lightbulb"></i> Resume Tips</h6>`;
        data.resume_tips.forEach(tip => {
            html += `<div class="card mb-2"><div class="card-body p-2">
                <strong>${tip.category}</strong>
                <ul class="mb-0 mt-1 ps-3">
                    ${tip.tips.map(t => `<li><small>${t}</small></li>`).join('')}
                </ul>
            </div></div>`;
        });
    }
    
    // Job Recommendations
    if (data.recommendations && data.recommendations.length) {
        html += `<h6 class="mt-3 mb-2"><i class="fas fa-briefcase"></i> Recommended Jobs</h6>`;
        data.recommendations.forEach(job => {
            // Use apply_link first, fallback to message_link
            const applyUrl = job.apply_link || job.message_link;
            html += `
                <div class="card mb-2">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between">
                            <strong>${job.title}</strong>
                            <span class="badge ${job.match_score > 70 ? 'bg-success' : job.match_score > 40 ? 'bg-warning' : 'bg-secondary'}">${job.match_score}%</span>
                        </div>
                        <div class="mt-2">
                            ${applyUrl ? 
                                `<a href="${applyUrl}" target="_blank" class="btn btn-sm btn-success"><i class="fab fa-telegram"></i> Apply Now</a>` : 
                                '<span class="text-muted small">No apply link available</span>'}
                            <button class="btn btn-sm btn-outline-primary ms-2" onclick="viewSkillGap(${job.job_id})">Skill Gap</button>
                        </div>
                        ${job.channel ? `<div class="mt-1 small text-muted"><i class="fab fa-telegram"></i> ${job.channel}</div>` : ''}
                    </div>
                </div>
            `;
        });
    }
    
    // Learning Resources
    if (data.learning_resources && data.learning_resources.length) {
        html += `<h6 class="mt-3 mb-2"><i class="fas fa-graduation-cap"></i> Learning Resources</h6>`;
        data.learning_resources.forEach(r => {
            html += `<div class="card mb-2"><div class="card-body p-2">
                <strong>${r.skill}</strong><br>
                ${r.resources.map(res => `<a href="${res.url}" target="_blank" class="small me-2">${res.title}</a>`).join('')}
            </div></div>`;
        });
    }
    
    document.getElementById('results').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function viewSkillGap(jobId) {
    $('#gapModal').modal('show');
    $('#gapModalBody').html('<div class="text-center"><div class="loading-spinner"></div><p>Analyzing your skills...</p></div>');
    
    $.get(`/skill-gap/${jobId}`, function(data) {
        if (data.gaps && data.gaps.length) {
            let html = `<h6 class="mb-2">Missing Skills for: ${data.job_title}</h6>`;
            data.gaps.forEach(gap => {
                let priorityColor = gap.priority === 'High' ? '#dc3545' : gap.priority === 'Medium' ? '#ffc107' : '#28a745';
                html += `
                    <div style="background: ${gap.priority === 'High' ? '#ffe6e6' : gap.priority === 'Medium' ? '#fff3cd' : '#e6f4e6'}; border-left: 3px solid ${priorityColor}; padding: 10px; margin-bottom: 8px; border-radius: 8px;">
                        <strong>${gap.skill}</strong>
                        <span class="badge ${gap.priority === 'High' ? 'bg-danger' : gap.priority === 'Medium' ? 'bg-warning' : 'bg-success'}">${gap.priority}</span>
                        <br><a href="${gap.learning_url}" target="_blank" class="small">Learn this skill →</a>
                    </div>
                `;
            });
            $('#gapModalBody').html(html);
        } else {
            $('#gapModalBody').html('<div class="alert alert-success">🎉 You have all the skills required for this job!</div>');
        }
    }).fail(() => {
        $('#gapModalBody').html('<div class="alert alert-danger">Error loading gap analysis</div>');
    });
}
</script>
{% endblock %}
