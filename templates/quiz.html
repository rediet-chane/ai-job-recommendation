{% extends "base.html" %}

{% block title %}Skill Assessment Quiz{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-lg-8 offset-lg-2">
            <!-- Progress Card -->
            <div class="card mb-4 animate__animated animate__fadeInDown">
                <div class="card-header">
                    <i class="fas fa-tasks me-2"></i>
                    <span>Your Progress</span>
                </div>
                <div class="card-body">
                    <div class="progress" style="height: 20px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" 
                             id="progressBar" style="width: 0%;">
                            <span class="fw-bold" id="progressText">0% Complete</span>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <span class="text-muted" id="questionCounter">Question 1 of <span id="totalQuestions">0</span></span>
                        <span class="badge bg-primary" id="currentCategory">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Question Card -->
            <div class="card" id="quizCard">
                <div class="card-header">
                    <i class="fas fa-question-circle me-2"></i>
                    <span>Question <span id="currentQuestionNum">1</span></span>
                </div>
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-primary" id="question"></h4>
                    
                    <div id="options" class="mt-4">
                        <!-- Options will load here -->
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="d-flex justify-content-between mt-4">
                        <button class="btn btn-secondary" id="prevBtn" style="display: none;">
                            <i class="fas fa-arrow-left me-2"></i>Previous
                        </button>
                        <div></div>
                        <button class="btn btn-primary" id="nextBtn">
                            Next<i class="fas fa-arrow-right ms-2"></i>
                        </button>
                        <button class="btn btn-success" id="submitBtn" style="display: none;">
                            <i class="fas fa-check me-2"></i>Submit Quiz
                        </button>
                    </div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loading" style="display: none;" class="text-center my-5">
                <div class="loading-spinner"></div>
                <h4 class="text-white mt-3">Analyzing your skills...</h4>
                <p class="text-white-50">This may take a few seconds</p>
            </div>

            <!-- Results Section -->
            <div id="results" style="display: none;" class="mt-4"></div>
        </div>
    </div>
</div>

<!-- Modals (reuse from manual_input) -->
<div class="modal fade" id="gapModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-chart-bar me-2"></i>Skill Gap Analysis</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="gapModalBody"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let questions = [];
let currentQuestion = 0;
let answers = [];

// Load questions
$.ajax({
    url: '/get-quiz-questions',
    method: 'GET',
    success: function(data) {
        questions = data.questions;
        $('#totalQuestions').text(questions.length);
        if (questions.length > 0) {
            displayQuestion(0);
        }
    },
    error: function() {
        $('#quizCard').html(`
            <div class="card-body text-center p-5">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                <h4>Error Loading Quiz</h4>
                <p>Please try again later</p>
            </div>
        `);
    }
});

function displayQuestion(index) {
    if (index >= questions.length) return;
    
    const q = questions[index];
    
    // Update displays
    $('#currentQuestionNum').text(index + 1);
    $('#currentCategory').text(q.category);
    $('#question').text(q.question);
    
    // Create options
    let optionsHtml = '';
    q.options.forEach((option, i) => {
        const checked = answers[index] === i ? 'checked' : '';
        const letter = String.fromCharCode(65 + i); // A, B, C, D
        
        optionsHtml += `
            <div class="card mb-3 option-card" style="cursor: pointer;" onclick="selectOption(${q.id}, ${i})">
                <div class="card-body">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question${q.id}" id="opt${q.id}_${i}" 
                               value="${i}" ${checked}>
                        <label class="form-check-label w-100" for="opt${q.id}_${i}">
                            <span class="fw-bold me-3">${letter}.</span> ${option}
                        </label>
                    </div>
                </div>
            </div>
        `;
    });
    
    $('#options').html(optionsHtml);
    
    // Update buttons
    $('#prevBtn').toggle(index > 0);
    $('#nextBtn').toggle(index < questions.length - 1);
    $('#submitBtn').toggle(index === questions.length - 1);
    
    // Update progress
    const progress = ((index + 1) / questions.length) * 100;
    $('#progressBar').css('width', progress + '%');
    $('#progressText').text(Math.round(progress) + '% Complete');
    $('#questionCounter').text(`Question ${index + 1} of ${questions.length}`);
}

function selectOption(questionId, optionIndex) {
    $(`input[name="question${questionId}"]`).prop('checked', false);
    $(`#opt${questionId}_${optionIndex}`).prop('checked', true);
    
    // Highlight selected card
    $('.option-card').removeClass('border-primary bg-light');
    $(event.currentTarget).addClass('border-primary bg-light');
}

// Next button
$('#nextBtn').click(function() {
    const q = questions[currentQuestion];
    const selected = $(`input[name="question${q.id}"]:checked`).val();
    
    if (selected === undefined) {
        alert('Please select an answer before proceeding.');
        return;
    }
    
    answers[currentQuestion] = parseInt(selected);
    currentQuestion++;
    displayQuestion(currentQuestion);
});

// Previous button
$('#prevBtn').click(function() {
    const q = questions[currentQuestion];
    const selected = $(`input[name="question${q.id}"]:checked`).val();
    
    if (selected !== undefined) {
        answers[currentQuestion] = parseInt(selected);
    }
    
    currentQuestion--;
    displayQuestion(currentQuestion);
});

// Submit quiz
$('#submitBtn').click(function() {
    const q = questions[currentQuestion];
    const selected = $(`input[name="question${q.id}"]:checked`).val();
    
    if (selected === undefined) {
        alert('Please select an answer before proceeding.');
        return;
    }
    
    answers[currentQuestion] = parseInt(selected);
    
    // Hide quiz, show loading
    $('#quizCard').hide();
    $('.d-flex').hide();
    $('#loading').show();
    
    // Submit answers
    $.ajax({
        url: '/submit-quiz',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ answers: answers }),
        success: function(response) {
            $('#loading').hide();
            displayResults(response);
        },
        error: function() {
            $('#loading').hide();
            alert('Error submitting quiz. Please try again.');
            $('#quizCard').show();
            $('.d-flex').show();
        }
    });
});

function displayResults(data) {
    let html = `
        <div class="card animate__animated animate__fadeInUp">
            <div class="card-header bg-success text-white">
                <i class="fas fa-trophy me-2"></i>Your Quiz Results
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="display-1 text-success">${data.score || 0}</div>
                    <p class="lead">points earned out of ${data.total_possible || 30}</p>
                    
                    <div class="row justify-content-center">
                        <div class="col-md-6">
                            <div class="progress" style="height: 20px;">
                                <div class="progress-bar bg-success" 
                                     style="width: ${Math.min(100, ((data.score || 0)/30)*100)}%">
                                    ${Math.min(100, Math.round(((data.score || 0)/30)*100))}% Mastery
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <h5 class="mb-3"><i class="fas fa-check-circle text-success me-2"></i>Skills Identified:</h5>
                <div class="mb-4">
                    ${(data.skills || []).map(s => 
                        `<span class="skill-badge"><i class="fas fa-check-circle text-success me-1"></i>${s}</span>`
                    ).join('')}
                </div>
                
                <h5 class="mb-3"><i class="fas fa-briefcase text-primary me-2"></i>Your Job Recommendations:</h5>
    `;
    
    (data.recommendations || []).forEach((rec, index) => {
        const medals = ['🥇', '🥈', '🥉'];
        const medal = index < 3 ? medals[index] : '📌';
        
        html += `
            <div class="card mt-3 animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.2}s">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-1 text-center">
                            <span class="display-6">${medal}</span>
                        </div>
                        <div class="col-md-7">
                            <h5 class="text-primary">${rec.title}</h5>
                            <p class="text-muted mb-0"><i class="fas fa-tag me-2"></i>${rec.category || 'General'}</p>
                        </div>
                        <div class="col-md-2 text-center">
                            <span class="match-score">${rec.match_score}%</span>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-primary w-100 view-gap" data-job="${rec.job_id}">
                                <i class="fas fa-chart-bar me-1"></i>Gap
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    html += `
                <div class="text-center mt-4">
                    <a href="/quiz" class="btn btn-primary me-2">
                        <i class="fas fa-redo me-2"></i>Take Quiz Again
                    </a>
                    <a href="/manual-input" class="btn btn-success">
                        <i class="fas fa-pen me-2"></i>Manual Input
                    </a>
                </div>
            </div>
        </div>
    `;
    
    $('#results').html(html).show();
    
    // Add gap analysis handler
    $('.view-gap').click(function() {
        const jobId = $(this).data('job');
        viewSkillGap(jobId);
    });
}

function viewSkillGap(jobId) {
    $('#gapModal').modal('show');
    $('#gapModalBody').html(`
        <div class="text-center p-4">
            <div class="loading-spinner"></div>
            <p class="mt-3">Analyzing your skills...</p>
        </div>
    `);
    
    $.ajax({
        url: `/skill-gap/${jobId}`,
        method: 'GET',
        success: function(data) {
            let html = '';
            
            if (data.gaps && data.gaps.length > 0) {
                html += '<h5 class="mb-3">Skills to Develop:</h5>';
                data.gaps.forEach(gap => {
                    const priorityClass = gap.priority === 'High' ? 'priority-high' : 
                                         (gap.priority === 'Medium' ? 'priority-medium' : 'priority-low');
                    html += `
                        <div class="card mb-2">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <span class="fw-bold">${gap.skill}</span>
                                <span class="${priorityClass}">${gap.priority}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div class="alert alert-success text-center p-4">
                        <i class="fas fa-check-circle fa-3x mb-3"></i>
                        <h5>Congratulations!</h5>
                        <p>You have all the required skills for this job!</p>
                    </div>
                `;
            }
            
            $('#gapModalBody').html(html);
        },
        error: function() {
            $('#gapModalBody').html('<div class="alert alert-danger">Error loading skill gap analysis</div>');
        }
    });
}
</script>

<style>
.option-card {
    transition: all 0.3s;
    border: 2px solid transparent;
}

.option-card:hover {
    transform: translateX(10px);
    border-color: #ff6b6b;
    background: linear-gradient(135deg, #fff5f5, #fff0f0);
}

.option-card.border-primary {
    border-color: #4ecdc4 !important;
    background: linear-gradient(135deg, #f0faf9, #e6f5f3);
}

.form-check-input:checked {
    background-color: #4ecdc4;
    border-color: #4ecdc4;
}
</style>
{% endblock %}
