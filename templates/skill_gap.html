{% extends "base.html" %}

{% block title %}Skill Gap Analysis{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>Skill Gap Analysis</h4>
                </div>
                <div class="card-body" id="gapContent">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p>Analyzing your skills...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    const jobId = "{{ job_id }}";
    
    $.get(`/skill-gap/${jobId}`, function(data) {
        let html = `
            <h5>Job: ${data.job_title}</h5>
            <hr>
        `;
        
        if (data.gaps.length === 0) {
            html += '<div class="alert alert-success">✅ You have all the required skills for this job!</div>';
        } else {
            html += '<h6>Missing Skills:</h6>';
            data.gaps.forEach(function(gap) {
                html += `
                    <div class="alert alert-${gap.color}">
                        <strong>${gap.skill}</strong> - ${gap.priority} Priority
                    </div>
                `;
            });
        }
        
        $('#gapContent').html(html);
    }).fail(function() {
        $('#gapContent').html('<div class="alert alert-danger">Error loading skill gap analysis</div>');
    });
});
</script>
{% endblock %}
